# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: auth-service:latest
        imagePullPolicy: Never # For local testing with Minikube/Kind
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres-demo-password@auth-db:5432/auth_db"
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: microservices-secrets
              key: JWT_SECRET_KEY
        ports:
        - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - port: 8001
    targetPort: 8001

---
# Log Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-service
  template:
    metadata:
      labels:
        app: log-service
    spec:
      containers:
      - name: log-service
        image: log-service:latest
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres-demo-password@log-db:5432/logs_db"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: microservices-secrets
              key: ANTHROPIC_API_KEY
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: RABBITMQ_URL
        ports:
        - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: log-service
spec:
  selector:
    app: log-service
  ports:
  - port: 8002
    targetPort: 8002

