services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - lognet
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: auth_db
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    networks:
      - lognet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  log-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: logs_db
    volumes:
      - log_postgres_data:/var/lib/postgresql/data
    networks:
      - lognet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: notification_db
    volumes:
      - notif_postgres_data:/var/lib/postgresql/data
    networks:
      - lognet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth_service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@auth-db:5432/auth_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-demo-secret-key}
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - lognet

  log-service:
    build: ./log_service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@log-db:5432/logs_db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      log-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - lognet

  notification-service:
    build: ./notification_service
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@notification-db:5432/notification_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - lognet

  api-gateway:
    build: ./api_gateway
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - LOG_SERVICE_URL=http://log-service:8002
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-demo-secret-key}
    depends_on:
      - auth-service
      - log-service
    networks:
      - lognet

networks:
  lognet:

volumes:
  auth_postgres_data:
  log_postgres_data:
  notif_postgres_data:
