# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline  (4. CI/CD Concept)
#
# Triggers:  every push and pull-request on any branch
#
# Jobs:
#   lint        — ruff code-quality check
#   test        — pytest with coverage report
#   docker-build — verify the Docker image builds successfully
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff==0.8.6

      - name: Run ruff
        run: ruff check app/ tests/

  # ── Job 2: Test ─────────────────────────────────────────────────────────────
  test:
    name: "Test (pytest)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          API_KEY: "dev-secret-key"     # same default as Settings
          OPENAI_API_KEY: ""            # mock mode — no real API calls
        run: |
          pytest tests/ -v \
            --tb=short \
            --asyncio-mode=auto \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 3: Docker Build ─────────────────────────────────────────────────────
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false          # only validate the build; no registry push in this HW
          tags: smarttext-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
